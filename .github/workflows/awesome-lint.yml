name: awesome-lint

on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  lint:
    name: Run awesome-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run awesome-lint
        run: npx awesome-lint
        env:
          CI: true
